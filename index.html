<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Site Kapandı</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --accent: #ffffff;
            --neon: #00ffcc; /* Fixing ruhu için ufak bir neon dokunuş */
            --glass: rgba(255, 255, 255, 0.02);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--accent);
            font-family: 'Space Grotesk', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Modern Mesh Gradient Arka Plan */
        .mesh {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(at 0% 0%, hsla(167,100%,50%,0.1) 0, transparent 50%), 
                radial-gradient(at 100% 100%, hsla(210,100%,50%,0.1) 0, transparent 50%);
            z-index: -1;
        }

        .main-card {
            position: relative;
            padding: 4rem 2rem;
            width: 100%;
            max-width: 600px;
            text-align: center;
            background: var(--glass);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .main-card:hover {
            transform: scale(1.02);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .error-code {
            font-size: 10rem;
            font-weight: 700;
            line-height: 0.8;
            letter-spacing: -10px;
            background: linear-gradient(180deg, #fff 30%, rgba(255,255,255,0));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0.8;
            margin-bottom: 20px;
        }

        h2 {
            font-size: 2rem;
            font-weight: 300;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            color: #666;
            font-size: 1rem;
            margin-bottom: 40px;
            max-width: 80%;
            margin-left: auto;
            margin-right: auto;
        }

        .cta-container {
            position: relative;
            display: inline-block;
        }

        .fixing-btn {
            position: relative;
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 20px 40px;
            background: var(--accent);
            color: var(--bg);
            text-decoration: none;
            border-radius: 100px;
            font-weight: 700;
            font-size: 1.1rem;
            overflow: hidden;
            transition: 0.4s;
        }

        .fixing-btn:hover {
            background: var(--neon);
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.3);
        }

        /* Dekoratif Elemanlar */
        .circle {
            position: absolute;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            z-index: -1;
        }

        .c1 { width: 300px; height: 300px; top: -100px; right: -100px; }
        .c2 { width: 150px; height: 150px; bottom: -50px; left: -50px; }

    </style>
</head>
<body>

    <div class="mesh"></div>

    <div class="main-card">
        <div class="circle c1"></div>
        <div class="circle c2"></div>

        <div class="error-code">404</div>
        <h2>SİTE KAPANDI</h2>
        <p>Gidilen yol kapalı olabilir ancak sistem her zaman gelişmeye devam eder.</p>

        <div class="cta-container">
            <a href="https://fixing-by.github.io/search/" class="fixing-btn">
                <span>FIXING İLE DEVAM ET</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </a>
        </div>
    </div>

</body>
</html>
